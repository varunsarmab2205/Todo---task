<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Todo List</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("https://pbs.twimg.com/media/ErlccoDVcAAed8L.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.container{
width:350px;
padding:25px;
border-radius:20px;

background:rgba(255,255,255,0.2);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.3);

box-shadow:0px 5px 20px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:20px;
color:white;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:30px;
outline:none;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
border-radius:30px;
background:#764ba2;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
transform:scale(1.05);
transition:0.3s;
}

ul{
margin-top:20px;
list-style:none;
}

li{
background:rgba(255,255,255,0.4);
padding:12px;
margin-top:10px;
border-radius:10px;
color:white;
backdrop-filter:blur(5px);
}

</style>
</head>

<body>

<div class="container">

<h1>📝 My Todo List</h1>

<div class="input-box">

<input type="text" id="taskInput" placeholder="Add a task">

<button onclick="addTask()">Add</button>

</div>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
